name: Cloudflare Validate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-validate-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate production Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        timeout-minutes: 10
        run: npm run typecheck

      - name: Build production Worker
        timeout-minutes: 10
        run: npm run build

      - name: Dry-run production deploy
        timeout-minutes: 5
        run: npx wrangler deploy --dry-run
